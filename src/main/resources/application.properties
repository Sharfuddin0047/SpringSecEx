spring.application.name=SpringSecEx

spring.security.user.name=admin
spring.security.user.password=admin

spring.datasource.url=jdbc:postgresql://localhost:5432/spring_security
spring.datasource.username=postgres
spring.datasource.password=0000
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Force Hibernate to use Asia/Kolkata timezone for JDBC connections
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# NOTE:
# If you still see "Asia/Calcutta" errors, it means the JVM default timezone is wrong.
# In that case, run your app with:
#   java -Duser.timezone=Asia/Kolkata -jar target/yourapp.jar
# Or add -Duser.timezone=Asia/Kolkata in your IDE's Run Configurations (VM arguments).
#
# During development I was using PostgreSQL inside a Docker container rather than installing it locally.
# That container’s timezone environment variables (TZ/PGTZ) contributed to the mismatch,
# which is why I was getting the timezone issue.
